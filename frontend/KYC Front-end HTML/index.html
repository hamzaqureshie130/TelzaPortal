<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Onboarding | KYC Portal</title>
    <meta name="description"
        content="Complete your KYC profile to get access to enterprise-grade communication tools and infrastructure." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Decorative background blobs -->
    <div class="blob blob-top"></div>
    <div class="blob blob-bottom-right"></div>
    <div class="blob blob-left"></div>

    <!-- Page Wrapper -->
    <div class="page-wrapper">

        <!-- Header -->
        <div class="page-header">
            <h1 class="page-title">Client <span class="accent">Onboarding</span></h1>
            <p class="page-subtitle">Complete your profile to get access to enterprise-grade communication tools and
                infrastructure.</p>
        </div>

        <!-- KYC Card -->
        <div class="glass-card kyc-card">

            <!-- Progress Bar -->
            <div class="progress-bar-container" id="progressBar">
                <!-- Steps rendered by JS -->
            </div>

            <!-- Step Content -->
            <div class="step-wrapper" id="stepWrapper">
                <!-- Steps rendered by JS -->
            </div>

            <!-- Navigation Buttons -->
            <div class="nav-buttons">
                <button class="btn btn-outline" id="btnBack">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Back
                </button>
                <button class="btn btn-primary" id="btnNext">
                    Continue
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

        </div><!-- /kyc-card -->

    </div><!-- /page-wrapper -->

    <script src="app.js"></script>
</body>

</html>
